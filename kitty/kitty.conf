include ~/.config/omarchy/current/theme/kitty.conf

clipboard_control write-clipboard write-primary read-clipboard read-primary

# Font
font_family Adwaita Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        9.0

# Window
window_padding_width 8
window_padding_height 0
hide_window_decorations yes
show_window_resize_notification no
confirm_os_window_close 0
draw_minimal_borders true
enabled_layouts tall,fat,grid,stack,horizontal,vertical

scrollback_lines 10000

# Keybindings
map F11 toggle_fullscreen
# Optional: arrow-key versions
map alt+left  resize_window narrower 5
map alt+right resize_window wider   5
map alt+up    resize_window taller  3
map alt+down  resize_window shorter 3

map alt+shift+d combine : goto_layout splits : launch --location=vsplit --bias=30 --cwd=current

# Reload kitty configuration
map alt+shift+r load_config_file

# Search scrollback buffer
map alt+f launch --type=overlay --stdin-source=@screen_scrollback --stdin-add-formatting fzf --ansi --exact --style=full --color=16 --height=100% --margin=1,2 --preview='echo {}' --preview-window='right:50%:hidden:wrap' --bind='ctrl-/:toggle-preview'


map ctrl+j kitten pass_keys.py bottom ctrl+j
map ctrl+k kitten pass_keys.py top    ctrl+k
map ctrl+h kitten pass_keys.py left   ctrl+h
map ctrl+l kitten pass_keys.py right  ctrl+l

map cmd+ctrl+t set_tab_title


# Allow remote access
single_instance yes
allow_remote_control yes
listen_on unix:/tmp/mykitty

# Aesthetics
cursor_shape     block
cursor_trail     1
cursor_trail_decay 0.1 0.25

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
