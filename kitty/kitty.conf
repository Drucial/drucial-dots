# Import Theme
include rose-pine-moon.conf

# Font Rendering
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14

# Cursor Settings
cursor_shape     block
cursor_beam_thickness 2.5
cursor_trail 3
cursor_trail_decay 0.1 0.4
# shell_integration no-cursor


# Window Appearance
background_opacity      0.95
background_blur         32
window_margin_width     0
window_padding_width    8
hide_window_decorations titlebar-only

# Tab Appearance
tab_bar_margin_width    8
tab_bar_margin_height   6 0
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted

# Window Behavior
window_border_width 1pt
draw_minimal_borders true
focus_follows_mouse no
macos_quit_when_last_window_closed yes
macos_show_window_title_in none
scrollback_lines 50000
action_alias launch_tab launch --type=tab --cwd=current

# Zen Settings
enable_audio_bell no
mouse_hide_wait 2.0
confirm_os_window_close 0
touch_scroll_multiplier 5.0

enabled_layouts tall,fat,grid,stack,horizontal,vertical

# Possible perfomance hit: https://sw.kovidgoyal.net/kitty/conf/#performance-tuning
repaint_delay 8

macos_option_as_alt left

# URL Handling
url_style curly
detect_urls yes
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
open_url_with default
map cmd+shift+e open_url_with_hints

# Clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+shift+v paste_from_selection
clipboard_control write-clipboard write-primary read-clipboard read-primary

allow_remote_control yes
listen_on unix:/tmp/mykitty

# Keybindings
# Reload kitty configuration
map cmd+r load_config_file

# Tab Management
map cmd+t new_tab_with_cwd
map cmd+shift+w close_tab
map cmd+[ previous_tab
map cmd+] next_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8

# Window/Pane Management
# Setup 70/30 vertical split layout (disabled - using tmux)
map cmd+| combine : goto_layout splits : launch --location=vsplit --bias=30 --cwd=current
map cmd+\ launch --type=window --location=vsplit --cwd=current
map cmd+- launch --type=window --location=hsplit --cwd=current
map cmd+w close_window

# Window Movement
map alt+shift+h move_window left
map alt+shift+j move_window bottom
map alt+shift+k move_window top
map alt+shift+l move_window right

# Window Resizing
map alt+left  resize_window narrower 5
map alt+right resize_window wider   5
map alt+up    resize_window taller  3
map alt+down  resize_window shorter 3
map cmd+alt+0 resize_window reset

# Toggle to stack layout (fullscreen) - press again to return to previous layout
map cmd+f toggle_layout stack

# Reload kitty configuration
map cmd+r load_config_file

# Search scrollback buffer with moor (/ to search, & to filter, q to quit)
scrollback_pager moor --no-linenumbers --quit-if-one-screen
map cmd+shift+f show_scrollback

# Nvim navigation pass-through
map ctrl+j kitten pass_keys.py bottom ctrl+j
map ctrl+k kitten pass_keys.py top    ctrl+k
map ctrl+h kitten pass_keys.py left   ctrl+h
map ctrl+l kitten pass_keys.py right  ctrl+l

# Tab title
map cmd+ctrl+t set_tab_title
