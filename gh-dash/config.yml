prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Craftwork
    filters: is:open repo:craftworkco/craftwork
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  preview:
    open: true
    width: 0.45
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  universal:
    - key: ctrl+up
      builtin: pageUp
    - key: ctrl+down
      builtin: pageDown
  prs:
    - key: g
      name: lazygit
      command: cd {{.RepoPath}} && lazygit
    - key: R
      name: rerun failed jobs
      command: gh run rerun -R {{.RepoName}} --failed $(gh run list -R {{.RepoName}} -b {{.HeadRefName}} -s failure -L 1 --json databaseId --jq '.[0].databaseId')
repoPaths:
  craftworkco/*: ~/Dev/*
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
  colors:
    text:
      primary: "#e0def4"
      secondary: "#c4a7e7"
      inverted: "#232136"
      faint: "#a5a1bc"
      warning: "#f6c177"
      success: "#9ccfd8"
      error: "#eb6f92"
      actor: "#ea9a97"
    background:
      selected: "#2a283e"
    border:
      primary: "#56526e"
      secondary: "#44415a"
      faint: "#393552"
    icon:
      newcontributor: "#9ccfd8"
      contributor: "#ea9a97"
      collaborator: "#f6c177"
      member: "#c4a7e7"
      owner: "#eb6f92"
      unknownrole: "#6e6a86"
pager:
  diff: diffnav
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
