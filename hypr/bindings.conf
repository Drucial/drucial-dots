# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

# bindd = SUPER, return, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, return, Terminal, exec, omarchy-launch-or-focus kitty

# bindd = SUPER, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER SHIFT, F, File manager, exec, $terminal -e yazi

bindd = SUPER, B, Browser, exec, omarchy-launch-or-focus chromium
bindd = SUPER, C, Code, exec, omarchy-launch-or-focus code
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private
bindd = SUPER, Z, Browser, exec, omarchy-launch-or-focus zen

bindd = SUPER, M, Music, exec, omarchy-launch-or-focus spotify
# bindd = SUPER, N, Editor, exec, omarchy-launch-editor
bindd = SUPER, T, Activity, exec, $terminal -e btop
bindd = SUPER, D, Docker, exec, $terminal -e lazydocker
# bindd = SUPER, G, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"
# bindd = SUPER, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
# bindd = SUPER, slash, Passwords, exec, uwsm app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER, slash, ChatGPT, exec, omarchy-launch-or-focus-webapp ChatGPT "https://chatgpt.com"
# bindd = SUPER SHIFT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-or-focus-webapp "Notion Calendar" "https://calendar.notion.so/"
bindd = SUPER, E, Email, exec, omarchy-launch-or-focus-webapp Superhuman "https://mail.superhuman.com/"
bindd = SUPER, F, Figma, exec, omarchy-launch-or-focus-webapp Figma "https://figma.com/"
bindd = SUPER, L, Linear, exec, omarchy-launch-or-focus-webapp Figma "https://linear.app/"
bindd = SUPER, N, Notion, exec, omarchy-launch-or-focus-webapp Notion "https://www.notion.so/"
bindd = SUPER, S, Slack, exec, omarchy-launch-or-focus-webapp Slack "https://app.slack.com/client"
bindd = SUPER, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
unbind = SUPER, SPACE
bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Arrow Between Workspaces
bindd = SUPER CTRL, right, Next workspace, workspace, e+1
bindd = SUPER CTRL, left, Previous workspace, workspace, e-1
